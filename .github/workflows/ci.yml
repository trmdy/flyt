name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Typecheck + unsigned build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build + package (unsigned)
        # No signing identity on CI — electron-builder ad-hoc signs on arm64.
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist

      - name: Upload unsigned macOS build
        uses: actions/upload-artifact@v4
        with:
          name: flyt-macos-unsigned-arm64
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
          retention-days: 14
